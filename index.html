<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sohail's personal collection of top 10 movies, TV shows and anime of all time." />
  <title>Sohail's CineVault</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">Sohail's CineVault</h1>
      <p class="site-subtitle">My All-Time Favorites</p>
    </div>
  </header>

  <main class="main-content">

    <nav class="tab-nav" role="tablist">
      <button class="tab-btn active" role="tab" aria-selected="true"  onclick="switchTab(0)">🎬 Movies</button>
      <button class="tab-btn"        role="tab" aria-selected="false" onclick="switchTab(1)">📺 TV Shows</button>
      <button class="tab-btn"        role="tab" aria-selected="false" onclick="switchTab(2)">✨ Anime</button>
    </nav>

    <section id="sec-movies" class="tab-section">
      <h2 class="section-heading">Top 10 Movies</h2>
      <div class="card-grid" id="grid-movies"></div>
    </section>

    <section id="sec-tv" class="tab-section hidden">
      <h2 class="section-heading">Top 10 TV Shows</h2>
      <div class="card-grid" id="grid-tv"></div>
    </section>

    <section id="sec-anime" class="tab-section hidden">
      <h2 class="section-heading">Top 10 Anime</h2>
      <div class="card-grid" id="grid-anime"></div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Made by Sohail Azain &nbsp;·&nbsp; My Personal Collection</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
